# Build Android APK in the cloud — no Android Studio on your laptop.
# Actions → Build APK → Run workflow → download artifact, or auto-commit to repo.
name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'package.json'
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'scripts/build-apk.js'
      - 'scripts/sync-capacitor-config.js'
      - 'scripts/generate-version.js'
      - 'scripts/web-url.js'

permissions:
  contents: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    env:
      WEB_URL: https://thekedari-1.onrender.com
      API_URL: https://thekedari-api.onrender.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: |
          chmod +x android/gradlew
          node scripts/build-apk.js

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: thekedari-apk
          path: |
            backend/apk/thekedari.apk
            src/assets/thekedari.apk
            src/assets/version.json
          retention-days: 90

      - name: Commit APK to repo (for Render deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/apk/thekedari.apk src/assets/thekedari.apk src/assets/version.json
          git diff --staged --quiet && echo "No APK changes to commit" && exit 0
          git commit -m "chore: build APK v$(node -p "require('./package.json').version") [skip ci]"
          git push
