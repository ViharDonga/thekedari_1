version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: thekedari-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: thekedari
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: thekedari-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@thekedari.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    depends_on:
      - postgres

volumes:
  pgdata:
