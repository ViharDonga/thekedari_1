<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tab1" [routerLink]="['/tabs/tab1']" *ngIf="authService.canAccessTab('tab1')">
      <ion-icon aria-hidden="true" name="business"></ion-icon>
      <ion-label>{{ tabLabel('tab_dashboard', 'tab_dashboard_short') }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" [routerLink]="['/tabs/tab2']" *ngIf="authService.canAccessTab('tab2')">
      <ion-icon aria-hidden="true" name="people"></ion-icon>
      <ion-label>{{ tabLabel('tab_labour', 'tab_labour_short') }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" [routerLink]="['/tabs/tab3']" *ngIf="authService.canAccessTab('tab3')">
      <ion-icon aria-hidden="true" name="cube"></ion-icon>
      <ion-label>{{ tabLabel('tab_materials', 'tab_materials_short') }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab4" [routerLink]="['/tabs/tab4']" *ngIf="authService.canAccessTab('tab4')">
      <ion-icon aria-hidden="true" name="stats-chart"></ion-icon>
      <ion-label>{{ tabLabel('tab_reports', 'tab_reports_short') }}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
