<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Thekedari - Labour & Site Management</title>

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
  <link rel="manifest" href="assets/manifest.webmanifest" />
  <meta name="theme-color" content="#ff9f0a" />
  <meta name="apple-mobile-web-app-title" content="Thekedari" />
  <link rel="apple-touch-icon" href="assets/shapes.svg" />

  <!-- SPA: after Render rewrite to index.html, convert /tabs/... paths to hash routes -->
  <script>
    (function () {
      var path = window.location.pathname;
      var hash = window.location.hash;
      if (path && path !== '/' && path !== '/index.html' && !/\.[a-z0-9]+$/i.test(path) && !hash) {
        window.location.replace('/#' + path + window.location.search);
      }
    })();
  </script>

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>

<body>
  <app-root></app-root>
</body>

</html>
